name: Fetch CMS Coverage Data
# Runs manually, on-demand, from GitHub's US-based servers
# (bypasses the CloudFront geo-block that blocks the API from outside the US)

on:
  workflow_dispatch:

jobs:
  fetch-ncd-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Fetch real CMS NCD data
        run: python fetch_cms_coverage_data.py

      - name: Upload result as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: cms-coverage-data
          path: data/cms_coverage/ncd_documents.json
